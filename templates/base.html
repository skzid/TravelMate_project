<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">TravelMate</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <div class="navbar-nav me-auto">
                    <a class="nav-link" href="{{ url_for('index') }}">Лента</a>
                    {% if current_user.is_authenticated %}
                        <a class="nav-link" href="{{ url_for('add_trip') }}">Добавить место</a>
                    {% endif %}
                </div>
                <div class="navbar-nav">
                    {% if current_user.is_authenticated %}
                        <span class="navbar-text me-3">{{ current_user.name }}</span>
                        <a class="btn btn-light btn-sm" href="{{ url_for('logout') }}">Выйти</a>
                    {% else %}
                        <a class="btn btn-outline-light btn-sm me-2" href="{{ url_for('register') }}">Регистрация</a>
                        <a class="btn btn-light btn-sm" href="{{ url_for('login') }}">Войти</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
</header>

<main class="container py-4">
    {% block content %}{% endblock %}
</main>

<footer class="border-top py-3">
    <div class="container text-muted small">
        Учебный WEB-проект.
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
